# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    app.active_product_source: '%env(ACTIVE_PRODUCT_SOURCE)%'
    app.active_cache_driver: '%env(ACTIVE_CACHE_DRIVER)%'
    app.active_counter_mode: '%env(ACTIVE_COUNTER_MODE)%'
    app.counter_base_mode: '%env(resolve:COUNTER_BASE_MODE)%'
    app.es_index_name: '%env(ES_INDEX_NAME)%'

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.
        bind:
            $projectDir: '%kernel.project_dir%'
            $cacheDir: '%env(resolve:CACHE_DIR)%'
            $counterDir: '%env(resolve:COUNTER_DIR)%'
            $counterBaseMode: '%env(resolve:COUNTER_BASE_MODE)%'
            $redisHealth: '@app.health.redis'
            $mysqlHealth: '@app.health.mysql'
            $elasticSearchHealth: '@app.health.elasticsearch'

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    # --- Drivers ---

    PDO:
        class: PDO
        factory: ['App\Infrastructure\Factory\PdoConnectionFactory', 'create']
        arguments:
            $databaseUrl: '%env(resolve:DATABASE_URL)%'
        lazy: true

    Elastic\Elasticsearch\Client:
        factory: ['Elastic\Elasticsearch\ClientBuilder', 'fromConfig']
        arguments:
            - hosts: ['%env(resolve:ELASTICSEARCH_URL)%']

    Redis:
        class: Redis
        factory: ['App\Infrastructure\Factory\RedisConnectionFactory', 'create']
        arguments:
            $dsn: '%env(resolve:REDIS_URL)%'
        lazy: true

    # --- Health Check Adapters ---

    App\Infrastructure\Health\MySqlHealthAdapter: '@app.health.mysql'
    App\Infrastructure\Health\ElasticSearchHealthAdapter: '@app.health.elasticsearch'
    App\Infrastructure\Health\RedisHealthAdapter: '@app.health.redis'

    app.health.mysql:
        class: App\Infrastructure\Health\MySqlHealthAdapter
        arguments:
            $pdo: '@PDO'

    app.health.elasticsearch:
        class: App\Infrastructure\Health\ElasticSearchHealthAdapter
        arguments:
            $client: '@Elastic\Elasticsearch\Client'

    app.health.redis:
        class: App\Infrastructure\Health\RedisHealthAdapter
        arguments:
            $redis: '@Redis'

    # --- Application ---

    App\Domain\Contract\EnvFileWriterInterface:
        class: App\Infrastructure\Adapter\EnvFileWriterAdapter

    App\Domain\Contract\SampleIdProviderInterface: '@App\Domain\Contract\ProductSourceInterface'

    App\Application\Service\DashboardManager:
        arguments:
            $mysqlHealth: '@app.health.mysql'
            $elasticSearchHealth: '@app.health.elasticsearch'
            $redisHealth: '@app.health.redis'
            $seeder: '@App\Domain\Contract\SeederInterface'

    App\Application\Service\ProductService:
        arguments:
            $cacheTtl: '%env(int:CACHE_TTL)%'

    # --- Commands ---

    App\Infrastructure\Command\SeedCommand:
        arguments:
            $defaultSeedCount: '%env(int:SEED_COUNT)%'

    App\Infrastructure\Command\ElasticSearchInitCommand:
        arguments:
            $esIndexName: '%app.es_index_name%'

    App\Infrastructure\Service\DataSeederService:
        arguments:
            $esIndexName: '%app.es_index_name%'

    # --- Domain Ports (Adapters) ---

    App\Domain\Contract\ConfigInterface:
        class: App\Infrastructure\Config\EnvConfig

    App\Domain\Contract\IElasticSearchDriver:
        class: App\Infrastructure\Driver\SimpleElasticSearchDriver
        arguments:
            $client: '@Elastic\Elasticsearch\Client'
            $esIndexName: '%app.es_index_name%'

    App\Domain\Contract\IMysqlDriver:
        class: App\Infrastructure\Driver\SimpleMySqlDriver

    App\Domain\Contract\ProductSourceInterface:
        factory: ['@App\Infrastructure\Factory\ProductSourceFactory', 'create']

    App\Domain\Contract\CacheInterface:
        factory: ['@App\Infrastructure\Factory\CacheAdapterFactory', 'create']
        arguments:
            $type: '%app.active_cache_driver%'

    App\Domain\Contract\CounterInterface:
        factory: ['@App\Infrastructure\Factory\CounterAdapterFactory', 'create']
        arguments:
            $mode: '%app.active_counter_mode%'

    App\Domain\Contract\SyncCounterInterface:
        factory: ['@App\Infrastructure\Factory\CounterAdapterFactory', 'createSync']
        arguments:
            $mode: '%app.active_counter_mode%'

    App\Domain\Contract\SeederInterface:
        class: App\Infrastructure\Seeder\SeederAdapter
